services:
  # Spring Boot Backend Service
  - type: web
    name: nexus-trade-core-backend
    env: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /api/v1/actuator/health
    autoDeploy: true
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/nexus-trade-core-*.jar
    envVars:
      - key: DATABASE_URL
        sync: false
      value: jdbc:postgresql://dpg-cv9l8n7jm2s3f8g5a0.oregon-postgres.render.com:5432/nexustrade_prod
      - key: DATABASE_USERNAME  
        sync: false
        value: nexustrade_user
      - key: DATABASE_PASSWORD
        sync: false
        value: ${DATABASE_PASSWORD}
      - key: JWT_SECRET
        sync: false
        value: ${JWT_SECRET}
      - key: SERVER_PORT
        sync: false
        value: 8080
