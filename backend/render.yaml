services:
  # Type of service to deploy
  type: web
  
  # Name of your service
  name: nexus-trade-backend
  
  # Runtime environment
  runtime: docker
  
  # Repository to deploy from
  repo: https://github.com/shambsinha/nexus-trade-core.git
  
  # Root directory where Dockerfile is located
  rootDir: backend
  
  # Dockerfile path
  dockerfilePath: ./Dockerfile
  
  # Port your service listens on
  httpPort: 8080
  
  # Health check path
  healthCheckPath: /api/v1/auth/login
  
  # Auto-deploy on pushes to main branch
  autoDeploy: true
  
  # Environment variables
  env:
    # Database configuration
    - key: DATABASE_URL
      value: jdbc:postgresql://ep-little-rain-anufkqgy.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
    - key: DATABASE_USERNAME
      value: neondb_owner
    - key: DATABASE_PASSWORD
      value: npg_8msaqdTNXE4r
    - key: JWT_SECRET
      value: mySecretKey123456789012345678901234567890
    - key: JWT_EXPIRATION_MS
      value: "86400000"
    - key: SERVER_PORT
      value: "8080"
  
  # Instance type (paid tier - Starter)
  instanceType: starter
  
  # Region
  region: oregon
  
  # Plan name
  plan: starter
  
  # Persistent storage configuration
  disk:
    name: nexus-trade-storage
    sizeGB: 10
    mountPath: /app/data
  
  # SSH access configuration
  sshKeys:
    - name: nexus-trade-ssh
      publicKey: ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABgQC... your-public-key-here
  
  # Scaling configuration
  scaling:
    minInstances: 1
    maxInstances: 3
    targetCPUUtilization: 70
  
  # Monitoring and alerts
  healthCheck:
    path: /api/v1/actuator/health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 3
    failureThreshold: 3
  
  # Performance optimization
  performance:
    cpu: 1
    memory: 512
