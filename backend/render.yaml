services:
  # Spring Boot Backend Service
  - type: web
    name: nexus-trade-core-backend
    env: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile.render
    healthCheckPath: /api/v1/actuator/health
    autoDeploy: true
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/nexus-trade-core-*.jar
    envVars:
      - key: DATABASE_URL
        sync: false
      value: jdbc:postgresql://ep-little-rain-anufkqgy.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: DATABASE_USERNAME  
        sync: false
        value: nexustrade_user
      - key: DATABASE_PASSWORD
        sync: false
        value: ${DATABASE_PASSWORD}
      - key: JWT_SECRET
        sync: false
        value: ${JWT_SECRET}
      - key: SERVER_PORT
        sync: false
        value: 8080
