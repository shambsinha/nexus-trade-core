services:
  # Type of service to deploy
  type: web
  
  # Name of your service
  name: nexus-trade-backend
  
  # Runtime environment
  runtime: docker
  
  # Repository to deploy from
  repo: https://github.com/shambsinha/nexus-trade-core.git
  
  # Root directory where Dockerfile is located
  rootDir: backend
  
  # Dockerfile path
  dockerfilePath: ./Dockerfile
  
  # Port your service listens on
  httpPort: 8080
  
  # Health check path
  healthCheckPath: /api/v1/auth/login
  
  # Auto-deploy on pushes to main branch
  autoDeploy: true
  
  # Environment variables
  env:
    # Database configuration
    - key: DATABASE_URL
      value: jdbc:postgresql://ep-little-rain-anufkqgy.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
    - key: DATABASE_USERNAME
      value: neondb_owner
    - key: DATABASE_PASSWORD
      value: npg_8msaqdTNXE4r
    - key: JWT_SECRET
      value: mySecretKey123456789012345678901234567890
    - key: JWT_EXPIRATION_MS
      value: "86400000"
    - key: SERVER_PORT
      value: "8080"
  
  # Instance type (free tier)
  instanceType: free
  
  # Region
  region: oregon
  
  # Plan name
  plan: free
