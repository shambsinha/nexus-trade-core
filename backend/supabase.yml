services:
  # Database service
  database:
    image: supabase/postgres:15
    container_name: nexus-trade-db
    environment:
      POSTGRES_DB: nexus_trade
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: localhost
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - nexus-network
    restart: unless-stopped

  # Backend service (Spring Boot)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: nexus-trade-backend
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:${POSTGRES_PASSWORD}@database:5432/nexus_trade
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: 86400000
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - database
    networks:
      - nexus-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/auth/login"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Supabase CLI service (for deployment)
  supabase:
    image: supabase/cli:latest
    container_name: supabase-cli
    volumes:
      - ./backend:/workspace
      - supabase_config:/root/.supabase
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ACCESS_TOKEN: ${SUPABASE_ACCESS_TOKEN}
    working_dir: /workspace
    networks:
      - nexus-network
    profiles:
      - cli

volumes:
  postgres_data:
    driver: local
  supabase_config:
    driver: local

networks:
  nexus-network:
    driver: bridge
